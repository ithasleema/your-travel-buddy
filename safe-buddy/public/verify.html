<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Identity 💗</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="header">
        <h1>🛡️ Identity Verification</h1>
        <p class="subtitle">Two-tier verification to keep everyone safe</p>
        <a href="index.html" class="back-link">← Back to Find Buddy</a>
    </div>

    <div class="box">
        <div class="verify-steps">

            <!-- TIER 1 -->
            <div class="step-card">
                <div class="tier-badge">Tier 1</div>
                <h3>📧 Social & Email Linking</h3>
                <input id="name" type="text" placeholder="Your full name">
                <input id="contact" type="tel" placeholder="Phone number (e.g. 9876543210)">
                <input id="email" type="email" placeholder="Email address">
                <input id="social" type="text" placeholder="Instagram or LinkedIn username">
                <button onclick="tier1Verify()" id="tier1Btn">✅ Verify Tier 1</button>
                <p id="tier1Status" class="status-msg"></p>
            </div>

            <!-- TIER 2 -->
            <div class="step-card">
                <div class="tier-badge">Tier 2</div>
                <h3>🪪 Govt ID + Live Selfie</h3>

                <p style="margin-bottom:8px;font-size:13px;color:#555;">Upload Government ID (Aadhar / Passport /
                    License)</p>
                <input type="file" id="idUpload" accept="image/*">

                <p style="margin:12px 0 6px;font-size:13px;color:#555;">Live Selfie (for catfish prevention)</p>
                <video id="video" width="260" height="200" autoplay playsinline></video>
                <canvas id="canvas" style="display:none;"></canvas>

                <button onclick="startCamera()" id="cameraBtn">📷 Start Camera</button>
                <button onclick="capture()" id="captureBtn" style="display:none;">📸 Capture Selfie</button>

                <img id="selfiePreview"
                    style="display:none;width:200px;border-radius:10px;border:2px solid #ffb3d1;margin:10px auto;">

                <button onclick="tier2Verify()" id="tier2Btn" style="margin-top:14px;">🔒 Complete Verification</button>
                <p id="status" class="status-msg"></p>
            </div>

        </div>
    </div>

    <!-- SOS Button -->
    <div style="max-width:360px;margin:0 auto 30px;padding:0 16px;">
        <button class="sos-btn" onclick="triggerSOS()">🆘 SOS — I'm in Danger!</button>
    </div>

    <script src="verify.js"></script>
</body>

</html>
